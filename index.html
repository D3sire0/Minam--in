<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seni Seviyorum ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main-pink: #ff4d6d; --soft-pink: #ff80ab; }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, #fff0f3 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; height: 100vh; justify-content: flex-end;
        }

        /* Arka Plan Süzülen Küçük Kalpler */
        .bg-heart {
            position: absolute; color: rgba(255, 77, 109, 0.2);
            pointer-events: none; z-index: 1;
            animation: bgFloat 10s linear infinite;
        }
        @keyframes bgFloat {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .jump { animation: jumpAnim 0.5s ease; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-60px); }
        }

        #npc {
            width: 75%; max-width: 320px; z-index: 10;
            transition: all 0.3s ease; margin-bottom: -30px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        #dialog-box {
            width: 92%; max-width: 480px; background: rgba(255, 255, 255, 0.98);
            border-radius: 30px; padding: 25px; box-sizing: border-box;
            z-index: 20; margin-bottom: 25px; border: 4px solid var(--soft-pink);
            position: relative; box-shadow: 0 15px 40px rgba(255, 77, 109, 0.3);
        }

        #text { font-size: 1.15rem; color: #444; min-height: 70px; text-align: center; margin-bottom: 45px; }

        #next-btn {
            background: var(--main-pink); color: white; border: none; padding: 14px;
            border-radius: 50px; cursor: pointer; position: absolute;
            bottom: 15px; left: 50%; transform: translateX(-50%); width: 80%;
            font-weight: bold; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #heart-game { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        
        .heart {
            position: absolute; font-size: 50px; cursor: pointer;
            z-index: 6; animation: floatUp 3.5s linear forwards;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh); opacity: 1; }
            to { transform: translateY(-15vh); opacity: 0; }
        }

        #score-board {
            position: absolute; top: 50px; font-size: 28px; color: var(--main-pink);
            font-weight: 900; display: none; z-index: 30; text-shadow: 2px 2px 0px white;
        }
    </style>
</head>
<body id="body">

<div id="score-board">❤️ <span id="count">0</span> / 10</div>

<div id="game-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div id="heart-game"></div>
    <img id="npc" src="karakter.png" alt="Karakter">
    <div id="dialog-box">
        <div id="text"></div>
        <button id="next-btn">Devam Et ✨</button>
    </div>
</div>

<script>
    const bgMusic = new Audio('muzik.mp3');
    bgMusic.loop = true;
    const hitSound = new Audio('tik.mp3');

    // Müzik Çalma Fonksiyonu (Daha Güçlü)
    function playMusic() {
        bgMusic.play().then(() => {
            console.log("Müzik başladı");
        }).catch(err => {
            console.log("Müzik hala bekleniyor: ", err);
        });
    }

    // Arka Plan Kalp Parçacıkları Oluşturma
    function createBgHearts() {
        for(let i=0; i<15; i++) {
            const h = document.createElement('div');
            h.className = 'bg-heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            h.style.animationDelay = (Math.random() * 10) + 's';
            document.body.appendChild(h);
        }
    }
    createBgHearts();

    const messages = [
        "Selam canım! 😍 Sonunda buradasın.",
        "Bu küçük dünyayı tamamen senin için kurdum.",
        "Şimdi ekranda uçuşan kalpleri yakalaman gerekiyor...",
        "Hepsini toplayınca çok güzel bir sürpriz seni bekliyor! ❤️"
    ];

    let step = 0; let score = 0;
    const textDiv = document.getElementById('text');
    const btn = document.getElementById('next-btn');
    const npcImg = document.getElementById('npc');
    const gameArea = document.getElementById('heart-game');
    const board = document.getElementById('score-board');

    function writer(txt, i = 0) {
        if (i === 0) textDiv.innerHTML = "";
        if (i < txt.length) {
            textDiv.innerHTML += txt.charAt(i);
            setTimeout(() => writer(txt, i + 1), 40);
        }
    }
    writer(messages[0]);

    btn.onclick = () => {
        document.getElementById('body').classList.add('shake');
        setTimeout(() => document.getElementById('body').classList.remove('shake'), 400);
        
        playMusic(); // Her tıklamada çalmayı dene

        step++;
        if (step < messages.length) {
            writer(messages[step]);
        } else {
            startMiniGame();
        }
    };

    function startMiniGame() {
        document.getElementById('dialog-box').style.display = 'none';
        npcImg.style.width = '110px'; npcImg.style.position = 'fixed';
        npcImg.style.bottom = '20px'; npcImg.style.left = '20px';
        gameArea.style.display = 'block'; board.style.display = 'block';

        const spawner = setInterval(() => {
            if (score >= 10) { clearInterval(spawner); endGame(); }
            else { spawnHeart(); }
        }, 900);
    }

    function spawnHeart() {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '❤️';
        h.style.left = Math.random() * 80 + 10 + '%';
        
        h.onclick = (e) => {
            score++;
            document.getElementById('count').innerText = score;
            hitSound.cloneNode(true).play();
            
            // KALBE TIKLAYINCA PEMBE PATLAMA (Mini Konfeti)
            confetti({
                particleCount: 20, spread: 50,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: ['#ff4d6d', '#ff80ab', '#ffffff']
            });

            h.remove();
            npcImg.src = 'ziplamakarakter.png';
            npcImg.classList.add('jump');
            setTimeout(() => {
                npcImg.classList.remove('jump');
                if(score < 10) npcImg.src = 'karakter.png';
            }, 500);
        };
        gameArea.appendChild(h);
        setTimeout(() => h.remove(), 3500);
    }

    function endGame() {
        gameArea.innerHTML = "";
        npcImg.src = 'ziplamakarakter.png';
        npcImg.style.width = "260px"; npcImg.style.left = "50%";
        npcImg.style.transform = "translateX(-50%)"; npcImg.style.bottom = "120px";

        // BÜYÜK FİNAL KONFETİSİ (Pembe ve Altın)
        var end = Date.now() + (3 * 1000);
        var colors = ['#ff4d6d', '#ffd700', '#ffffff'];

        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());

        document.getElementById('dialog-box').style.display = 'block';
        writer("Harikaydın sevgilim! ❤️ Bütün kalpleri topladın. Ama bil ki asıl kalbim her saniye senin için atıyor. Seni çok seviyorum!");
        btn.innerText = "Seni Çok Seviyorum ❤️";
        btn.onclick = () => { location.reload(); };
    }
</script>
</body>
</html>
