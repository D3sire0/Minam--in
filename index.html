<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seni Seviyorum ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff80ab;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #fff0f3 0%, #fce4ec 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. Yükleme Ekranı */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }

        .heart-loader {
            font-size: 50px; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        /* Arka Plan Kalpleri */
        .bg-heart {
            position: absolute; color: rgba(255, 77, 109, 0.15);
            pointer-events: none; z-index: 1; animation: bgFloat 12s linear infinite;
        }
        @keyframes bgFloat {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* Oyun Alanı */
        #game-view {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; z-index: 10;
        }

        #npc {
            width: 70%; max-width: 280px; margin-bottom: -20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            z-index: 11;
        }

        .jump { animation: jumpAnim 0.5s ease; }
        @keyframes jumpAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px) scale(1.1); } }

        /* Diyalog Kutusu */
        #ui-layer {
            width: 90%; max-width: 450px; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 30px;
            padding: 25px; box-sizing: border-box; margin-bottom: 30px;
            border: 3px solid white; box-shadow: 0 15px 45px rgba(255, 77, 109, 0.25);
            text-align: center; z-index: 20;
        }

        #text { font-size: 1.2rem; color: #444; font-weight: 700; min-height: 60px; margin-bottom: 40px; }

        #btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 15px; width: 85%;
            border-radius: 50px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; position: absolute; bottom: -25px; left: 50%;
            transform: translateX(-50%); box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }
        #btn:active { transform: translateX(-50%) scale(0.95); }

        /* Oyun Mekaniği */
        .game-heart {
            position: absolute; font-size: 55px; cursor: pointer;
            z-index: 50; animation: floatUp 4s linear forwards;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) scale(0.8); opacity: 1; }
            to { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        #score-board {
            position: fixed; top: 40px; font-size: 32px; font-weight: 900;
            color: var(--primary); text-shadow: 2px 2px 0 white; z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="heart-loader">❤️</div>
    <p style="color: #ff4d6d; font-weight: bold; margin-top: 15px;">Aşk Yükleniyor...</p>
</div>

<div id="score-board">❤️ <span id="count">0</span> / 10</div>

<div id="game-view">
    <div id="heart-container"></div>
    <img id="npc" src="karakter.png" alt="Ottomis">
    
    <div id="ui-layer">
        <div id="text"></div>
        <button id="btn">Başlayalım mı? ✨</button>
    </div>
</div>

<audio id="bgMusic" loop src="muzik.mp3"></audio>
<audio id="popSound" src="tik.mp3"></audio>

<script>
    const messages = [
        "Selam canım! 😍 Sonunda gelebildin.",
        "Bu dünyayı tamamen senin için tasarladım.",
        "Şimdi ekranda uçuşan 10 kalbi yakalaman gerekiyor...",
        "Hepsini toplayınca sana bir sürprizim var! ❤️"
    ];

    let step = 0, score = 0, gameActive = false;
    const textDiv = document.getElementById('text');
    const btn = document.getElementById('btn');
    const npc = document.getElementById('npc');
    const music = document.getElementById('bgMusic');
    const pop = document.getElementById('popSound');

    // 1. Yükleme Ekranı Kontrolü
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 800);
            writer(messages[0]);
        }, 1500);
    };

    // Arka Plan Kalpleri
    function createBg() {
        for(let i=0; i<12; i++) {
            const h = document.createElement('div');
            h.className = 'bg-heart'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            h.style.animationDelay = (Math.random() * 10) + 's';
            document.body.appendChild(h);
        }
    }
    createBg();

    function writer(txt, i = 0) {
        if (i === 0) textDiv.innerHTML = "";
        if (i < txt.length) {
            textDiv.innerHTML += txt.charAt(i);
            setTimeout(() => writer(txt, i + 1), 50);
        }
    }

    btn.onclick = () => {
        music.play().catch(() => {}); // Müziği başlat
        
        step++;
        if (step < messages.length) {
            writer(messages[step]);
            if (step === messages.length - 1) btn.innerText = "Oyunu Başlat! 🎈";
        } else {
            startSession();
        }
    };

    function startSession() {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('score-board').style.display = 'block';
        npc.style.width = '120px'; npc.style.position = 'fixed';
        npc.style.bottom = '20px'; npc.style.left = '20px';
        gameActive = true;
        
        const spawner = setInterval(() => {
            if (score >= 10) { clearInterval(spawner); endGame(); }
            else { spawnHeart(); }
        }, 800);
    }

    function spawnHeart() {
        const h = document.createElement('div');
        h.className = 'game-heart'; h.innerHTML = '❤️';
        h.style.left = Math.random() * 80 + 10 + '%';
        
        h.onclick = (e) => {
            score++;
            document.getElementById('count').innerText = score;
            pop.cloneNode(true).play();
            
            // TIKLAMA EFEKTİ (PEMBE)
            confetti({
                particleCount: 25, spread: 60,
                origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                colors: ['#ff4d6d', '#ff80ab', '#ffffff']
            });

            h.remove();
            npc.src = 'ziplamakarakter.png';
            npc.classList.add('jump');
            setTimeout(() => {
                npc.classList.remove('jump');
                if(score < 10) npc.src = 'karakter.png';
            }, 500);
        };
        document.getElementById('heart-container').appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('heart-container').innerHTML = "";
        npc.src = 'ziplamakarakter.png';
        npc.style.width = "280px"; npc.style.left = "50%";
        npc.style.transform = "translateX(-50%)";
        npc.style.bottom = "150px";

        // BÜYÜK FİNAL KONFETİSİ (ALTIN VE PEMBE)
        const duration = 5 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4d6d', '#ffd700'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4d6d', '#ffd700'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        document.getElementById('ui-layer').style.display = 'block';
        writer("Harikaydın sevgilim! ❤️ Bütün kalpleri topladın. Ama bil ki asıl kalbim her saniye senin için atıyor. Seni çok seviyorum!");
        btn.innerText = "Seni Çok Seviyorum ❤️";
        
        btn.onclick = () => {
            // SİTEDEN ATMA (Yönlendirme)
            alert("Şimdi seni gerçek dünyaya, yanıma uğurluyorum...");
            window.location.href = "https://www.google.com"; // Buraya istediğin adresi yazabilirsin
        };
    }
</script>

</body>
</html>
