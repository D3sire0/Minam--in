<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seni Seviyorum ❤️</title>
    <style>
        :root {
            --main-pink: #ff4d6d;
            --soft-pink: #ff80ab;
            --bg-gradient: linear-gradient(180deg, #fff0f3 0%, #f8bbd0 100%);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; justify-content: flex-end;
        }

        /* EKRAN TİTREME EFEKTİ */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* KARAKTER ZIPLAMA */
        .jump { animation: jumpAnim 0.5s ease; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-60px); }
        }

        /* NPC AYARLARI */
        #npc-container {
            position: relative;
            z-index: 10;
            display: flex; justify-content: center;
            width: 100%;
        }

        #npc {
            width: 75%; max-width: 320px;
            transition: all 0.3s ease;
            margin-bottom: -30px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* DİYALOG KUTUSU */
        #dialog-box {
            width: 92%; max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px; padding: 25px;
            box-sizing: border-box; z-index: 20;
            margin-bottom: 25px;
            border: 4px solid var(--soft-pink);
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.3);
            position: relative;
        }

        #text {
            font-size: 1.15rem; color: #444;
            min-height: 70px; text-align: center;
            margin-bottom: 45px; font-weight: 500;
            line-height: 1.5;
        }

        #next-btn {
            background: var(--main-pink); color: white;
            border: none; padding: 14px;
            border-radius: 50px; cursor: pointer;
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%); width: 80%;
            font-weight: bold; font-size: 1rem;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.2s;
        }

        #next-btn:active { transform: translateX(-50%) scale(0.95); }

        /* OYUN ALANI */
        #heart-game {
            display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; z-index: 5;
        }

        .heart {
            position: absolute; font-size: 50px;
            cursor: pointer; user-select: none;
            animation: floatUp 3.5s linear forwards;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        @keyframes floatUp {
            from { transform: translateY(110vh) scale(1); opacity: 1; }
            to { transform: translateY(-15vh) scale(1.4); opacity: 0; }
        }

        #score-board {
            position: absolute; top: 50px; font-size: 28px;
            color: var(--main-pink); font-weight: 900;
            display: none; z-index: 30;
            text-shadow: 2px 2px 0px white;
        }
    </style>
</head>
<body id="body">

<div id="score-board">❤️ <span id="count">0</span> / 10</div>

<div id="game-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div id="heart-game"></div>
    
    <div id="npc-container">
        <img id="npc" src="karakter.png" alt="Karakter">
    </div>

    <div id="dialog-box">
        <div id="text"></div>
        <button id="next-btn">Devam Et ✨</button>
    </div>
</div>

<script>
    // SES KONTROLLERİ
    const bgMusic = new Audio('muzik.mp3');
    bgMusic.loop = true;
    const hitSound = new Audio('tik.mp3');

    const messages = [
        "Selam canım! 😍 Sonunda buradasın.",
        "Bu küçük dünyayı tamamen senin için kurdum.",
        "Seninle ilgili her şey benim için çok değerli...",
        "Şimdi küçük bir sevgi testi yapalım mı?",
        "Ekranda uçuşan kalpleri yakalaman gerekiyor. Bakalım ne kadar hızlısın? ❤️"
    ];

    let step = 0;
    let score = 0;
    const textDiv = document.getElementById('text');
    const btn = document.getElementById('next-btn');
    const npcImg = document.getElementById('npc');
    const gameArea = document.getElementById('heart-game');
    const board = document.getElementById('score-board');

    // Yazı yazma efekti
    function writer(txt, i = 0) {
        if (i === 0) textDiv.innerHTML = "";
        if (i < txt.length) {
            textDiv.innerHTML += txt.charAt(i);
            setTimeout(() => writer(txt, i + 1), 45);
        }
    }

    // İlk mesajı başlat
    writer(messages[0]);

    btn.onclick = () => {
        // EKRAN SALLAMA
        document.getElementById('body').classList.add('shake');
        setTimeout(() => document.getElementById('body').classList.remove('shake'), 400);

        // MÜZİK BAŞLAT (Her tıkta kontrol eder, çalmıyorsa başlatır)
        bgMusic.play().catch(() => console.log("Müzik bekleniyor..."));

        step++;
        if (step < messages.length) {
            writer(messages[step]);
        } else {
            startMiniGame();
        }
    };

    function startMiniGame() {
        document.getElementById('dialog-box').style.display = 'none';
        npcImg.style.width = '120px';
        npcImg.style.position = 'fixed';
        npcImg.style.bottom = '20px';
        npcImg.style.left = '20px';
        gameArea.style.display = 'block';
        board.style.display = 'block';

        const spawner = setInterval(() => {
            if (score >= 10) {
                clearInterval(spawner);
                endGame();
            } else {
                spawnHeart();
            }
        }, 850);
    }

    function spawnHeart() {
        const h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = '❤️';
        h.style.left = Math.random() * 80 + 10 + '%';
        
        h.onclick = () => {
            score++;
            document.getElementById('count').innerText = score;
            hitSound.cloneNode(true).play();
            h.remove();

            // KARAKTER TEPKİSİ
            npcImg.src = 'ziplamakarakter.png';
            npcImg.classList.add('jump');
            setTimeout(() => {
                npcImg.classList.remove('jump');
                if(score < 10) npcImg.src = 'karakter.png';
            }, 500);
        };

        gameArea.appendChild(h);
        setTimeout(() => h.remove(), 3500);
    }

    function endGame() {
        gameArea.innerHTML = "";
        npcImg.src = 'ziplamakarakter.png';
        npcImg.style.width = "280px";
        npcImg.style.left = "50%";
        npcImg.style.transform = "translateX(-50%)";
        npcImg.style.bottom = "120px";
        npcImg.classList.add('jump');

        document.getElementById('dialog-box').style.display = 'block';
        writer("Harikaydın! ❤️ Bütün kalpleri topladın ama asıl kalbim her zaman sende kalacak. Seni çok seviyorum!");
        btn.innerText = "Seni Çok Seviyorum ❤️";
        btn.onclick = () => { location.reload(); };
    }
</script>

</body>
</html>
